<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>삼성증권mPOP AI상담사</title>
  <meta name="description" content="삼성증권 mPOP MTS 앱 내 AI 상담사 화면 시안" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== 앱 루트 ===== -->
  <div class="app">
    <!-- 배경: 전체 고정 (aurora gradient) -->
    <div class="aurora-bg" aria-hidden="true"></div>

    <!-- 고정 헤더: 채팅 화면에서만 표시 -->
    <header id="chat-header" class="chat-header" hidden>
      <button type="button" class="icon-btn header-close" id="header-close" aria-label="닫기">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <h1 class="header-title">삼성증권mPOP AI챗봇</h1>
    </header>

    <!-- 화면 전환 영역 -->
    <div class="screens">
      <!-- ===== 홈 화면 ===== -->
      <section id="screen-home" class="screen screen-home is-active">
        <!-- 홈 상단 바 -->
        <header class="home-header">
          <button type="button" class="icon-btn home-close" aria-label="닫기">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <h1 class="header-title">삼성증권mPOP AI챗봇</h1>
        </header>

        <!-- 중앙 영역 -->
        <div class="home-center">
          <div class="home-greeting" id="home-greeting">
            <p class="greet-hi">선재Lee님 안녕하세요.</p>
            <h2 class="greet-title">어떤 업무를<br />도와드릴까요?</h2>
            <p class="greet-sub">AI 상담사에게 자유롭게 물어보세요.</p>
          </div>

          <!-- 입력창 카드 -->
          <div class="home-input-card" id="home-input-card">
            <div class="input-text-row">
              <textarea
                id="home-textarea"
                rows="2"
                placeholder="필요한 업무를 입력해주세요"
                class="chat-textarea"
              ></textarea>
            </div>
            <div class="input-btn-row">
              <button type="button" class="icon-btn menu-trigger-btn" aria-label="챗봇 메뉴" data-open-menu>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
              </button>
              <div class="input-right-btns">
                <button type="button" class="icon-btn" aria-label="음성 입력">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button type="button" class="send-btn" id="home-send" aria-label="전송">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- 하단 챗봇 메뉴 트리거 -->
        <div class="home-menu-trigger">
          <button type="button" class="menu-chip" data-open-menu>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            챗봇 메뉴
          </button>
        </div>
      </section>

      <!-- ===== 채팅 화면 ===== -->
      <section id="screen-chat" class="screen screen-chat">
        <!-- 스크롤 대화 영역 -->
        <div class="chat-scroll mobile-scroll" id="chat-scroll">
          <div class="chat-thread" id="chat-thread">
            <!-- 메시지는 script.js가 렌더링 -->
          </div>
        </div>

        <!-- 하단 입력 영역 -->
        <div class="chat-input-bar" id="chat-input-bar">
          <div class="input-text-row chat-input-text-row">
            <input
              type="text"
              id="chat-input"
              placeholder="필요한 업무를 입력해주세요"
              class="chat-input-field"
            />
          </div>
          <div class="input-btn-row">
            <button type="button" class="icon-btn" aria-label="챗봇 메뉴" data-open-menu>
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
            </button>
            <div class="input-right-btns">
              <button type="button" class="icon-btn" aria-label="음성 입력">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <button type="button" class="send-btn" id="chat-send" aria-label="전송">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== 메뉴 바텀시트 ===== -->
    <div id="menu-overlay" class="menu-overlay" hidden></div>
    <div id="menu-sheet" class="menu-sheet" hidden>
      <div class="sheet-handle-wrap" id="sheet-handle">
        <span class="sheet-handle"></span>
      </div>
      <div class="sheet-header">
        <h2 class="sheet-title">챗봇 메뉴</h2>
        <button type="button" class="icon-btn" id="sheet-close" aria-label="닫기">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="sheet-body">
        <ul class="sheet-list" id="sheet-list">
          <!-- 메뉴 항목은 script.js가 렌더링 -->
        </ul>
        <div class="sheet-fade"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
